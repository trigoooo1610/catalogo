<!DOCTYPE html> <!-- Define que o documento usa HTML5 -->
<html lang="pt-br"> <!-- Elemento raiz do HTML e define o idioma -->

<head> <!-- Contém configurações e metadados da página -->
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta a página para telas de dispositivos móveis -->
    <title>Catálogo</title> <!-- Título da aba no navegador -->
    <script src='script.js'></script>
</head>

<body> <!-- Área onde fica todo o conteúdo visível do site -->
    <div class = "card">
        <!--Atributos da classe card-->
        <h2>Vai Corinthians!</h2>
        <img src="https://cdn.meutimao.com.br/img/ico/icon-100x100.png" alt="corinthians">
        <p>O corinthians é o melhor time</p>
        <a href="https://youtube.com">Youtube</a>
    </div>
    <div class="container">
        <h2 id = "titulo">Cadastrar</h2>

        <form id="meuFormulario">
            <p>Título:</p>
            <input type="text" id="Titulo" placeholder="Título">
            <p>URL da Imagem:</p>
            <input type="url" id="imagem" placeholder="URL da imagem">
            <p>Sinopse:</p>
            <textarea id="paragrafo" placeholder="Sinopse"></textarea>
            <p>Avaliação:</p>
            <input type="text" id="Avaliacao" placeholder="Avaliação">
            <button onClick = "alterarFundo()">Enviar</button>
        </form>
    </div>
</body>
